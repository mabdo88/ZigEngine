; Strife engine config — see src/engine/ini.zig for the parser and
; src/engine/config.zig for the full set of typed defaults this can override.
; Missing keys/sections fall back to those defaults.

[window]
width = 800
height = 600
vsync = true

[engine]
enable_validation = true

[audio]
master_volume = 1.0
ui_volume = 1.0
sfx_volume = 1.0
music_volume = 1.0
