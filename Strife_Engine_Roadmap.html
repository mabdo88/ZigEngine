<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Strife Engine Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--surf:#0d1018;--card:#11151e;--card2:#141820;
  --border:#1a1f2e;--border2:#222840;
  --amber:#c87810;--amber-b:#e08a18;--amber-d:rgba(200,120,16,.12);
  --blue:#3870bb;--green:#1e8848;--green-d:rgba(30,136,72,.12);
  --red:#8c2828;--text:#9ab8cc;--text2:#bdd0e4;--muted:#3a4c60;
  --mono:'JetBrains Mono','Cascadia Code',monospace;
  --sans:'Inter',-apple-system,sans-serif;
  --r:5px;
}
html{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;scroll-behavior:smooth}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* HEADER */
header{max-width:1080px;margin:0 auto;padding:36px 24px 28px;border-bottom:1px solid var(--border2)}
.hdr-top{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.badge{font-family:var(--mono);font-size:10px;letter-spacing:.14em;background:var(--amber-d);border:1px solid var(--amber);color:var(--amber-b);padding:3px 10px;border-radius:var(--r);text-transform:uppercase}
h1{font-size:20px;font-weight:700;color:var(--text2);letter-spacing:-.01em}
.stack{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em;margin-left:auto}
.goal{font-size:12px;color:var(--muted);margin-bottom:24px}

/* HUD CELLS */
.cells{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.cell{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:default;min-width:72px}
.cell-bar{width:72px;height:6px;background:var(--border2);border-radius:3px;overflow:hidden;position:relative}
.cell-fill{height:100%;border-radius:3px;background:var(--amber);transition:width .5s ease,background .5s ease;box-shadow:0 0 5px var(--amber);width:0%}
.cell-fill.complete{background:var(--green);box-shadow:0 0 8px var(--green)}
.cell-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:72px}
.cell-label.complete{color:var(--green)}

/* OVERALL */
.overall{display:flex;align-items:center;gap:12px}
.ob-wrap{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.ob-fill{height:100%;background:var(--amber);border-radius:2px;transition:width .4s ease}
.ob-pct{font-family:var(--mono);font-size:13px;color:var(--amber-b);min-width:38px;text-align:right;font-weight:500}
.ob-counts{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:52px}

/* MAIN */
main{max-width:1080px;margin:0 auto;padding:28px 24px 80px}

/* MILESTONE */
.ms{margin-bottom:16px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ms-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surf);cursor:pointer;user-select:none;transition:background .15s}
.ms-hdr:hover{background:var(--card)}
.ms-icon{font-size:14px;opacity:.75;flex-shrink:0}
.ms-num{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.06em;flex-shrink:0}
.ms-name{font-size:14px;font-weight:600;color:var(--text2);flex:1}
.ms-ptext{font-family:var(--mono);font-size:11px;color:var(--muted);flex-shrink:0}
.ms-mbar{width:64px;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;flex-shrink:0}
.ms-mfill{height:100%;background:var(--amber);border-radius:2px;transition:width .4s ease}
.chv{font-size:9px;color:var(--muted);margin-left:6px;transition:transform .2s;flex-shrink:0}
.chv.open{transform:rotate(90deg)}
.ms.stop .ms-hdr{background:rgba(140,40,40,.06);border-bottom:1px solid rgba(140,40,40,.25)}
.ms.stop .ms-name{color:#bb5555}

/* TASK LIST */
.ms-body{background:var(--card);border-top:1px solid var(--border)}
.task{border-bottom:1px solid var(--border)}
.task:last-child{border-bottom:none}
.task-main{display:flex;align-items:center;gap:10px;padding:9px 16px}

.task-cb{appearance:none;width:15px;height:15px;border:1px solid var(--border2);border-radius:3px;background:transparent;cursor:pointer;position:relative;flex-shrink:0;transition:all .15s}
.task-cb:hover{border-color:var(--amber)}
.task-cb:checked{background:var(--green);border-color:var(--green)}
.task-cb:checked::after{content:"✓";position:absolute;top:-1px;left:2px;font-size:10px;color:#fff;font-weight:700}
.task-cb.partial{background:rgba(200,120,16,.16);border-color:var(--amber)}
.task-cb.partial::after{content:"~";position:absolute;top:-2px;left:3px;font-size:11px;color:var(--amber);font-weight:700}

.task-name{flex:1;font-size:13px;color:var(--text);cursor:default}
.task-cb:checked + .task-name{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--border2)}
.task-name.partial{color:var(--amber)}

.tag{font-family:var(--mono);font-size:9px;letter-spacing:.07em;text-transform:uppercase;padding:2px 7px;border-radius:3px;flex-shrink:0}
.tg-platform{background:rgba(56,112,187,.14);color:#5594dd;border:1px solid rgba(56,112,187,.28)}
.tg-core{background:rgba(200,120,16,.1);color:#c87a28;border:1px solid rgba(200,120,16,.22)}
.tg-ecs{background:rgba(110,60,190,.14);color:#9070dd;border:1px solid rgba(110,60,190,.28)}
.tg-renderer{background:rgba(20,140,180,.12);color:#28aacc;border:1px solid rgba(20,140,180,.26)}
.tg-assets{background:rgba(170,120,30,.12);color:#c09030;border:1px solid rgba(170,120,30,.26)}
.tg-anim{background:rgba(180,70,130,.12);color:#cc60a0;border:1px solid rgba(180,70,130,.26)}
.tg-physics{background:rgba(40,160,90,.11);color:#38aa66;border:1px solid rgba(40,160,90,.24)}
.tg-scene{background:rgba(170,140,20,.11);color:#c8aa28;border:1px solid rgba(170,140,20,.24)}
.tg-audio{background:rgba(60,160,200,.11);color:#44b4cc;border:1px solid rgba(60,160,200,.24)}
.tg-ui{background:rgba(190,70,160,.11);color:#cc55bb;border:1px solid rgba(190,70,160,.24)}
.tg-gameplay{background:rgba(200,50,50,.1);color:#cc5050;border:1px solid rgba(200,50,50,.22)}

.exp-btn{background:none;border:1px solid var(--border2);color:var(--muted);padding:2px 8px;border-radius:3px;font-size:9px;cursor:pointer;font-family:var(--mono);letter-spacing:.07em;flex-shrink:0;transition:all .15s}
.exp-btn:hover{border-color:var(--amber);color:var(--amber)}
.exp-btn.open{border-color:var(--amber);color:var(--amber);background:var(--amber-d)}

/* TASK DETAIL */
.task-detail{display:none;padding:12px 16px 16px 41px;background:var(--card2);border-top:1px solid var(--border)}
.task-detail.show{display:block}
.det-desc{font-size:12.5px;color:var(--text);margin-bottom:10px;line-height:1.65}
.det-notes{margin-bottom:14px;list-style:none}
.det-notes li{font-size:12px;color:var(--muted);margin-bottom:3px;padding-left:14px;position:relative;line-height:1.5}
.det-notes li::before{content:"›";position:absolute;left:0;color:var(--amber);font-size:13px}
.prompt-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.prompt-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber)}
.copy-btn{background:var(--amber-d);border:1px solid rgba(200,120,16,.35);color:var(--amber);font-family:var(--mono);font-size:9px;padding:3px 10px;border-radius:3px;cursor:pointer;letter-spacing:.07em;transition:all .15s}
.copy-btn:hover{background:var(--amber);color:#000}
.copy-btn.ok{background:var(--green-d);border-color:var(--green);color:var(--green)}
.prompt-box{background:#060810;border:1px solid var(--border2);border-radius:4px;padding:11px 13px;font-family:var(--mono);font-size:11.5px;color:#7a9cb4;line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:260px;overflow-y:auto;tab-size:2}
.prompt-box::-webkit-scrollbar{width:3px}
.prompt-box::-webkit-scrollbar-thumb{background:var(--border2)}

/* STOP */
.stop-body{padding:20px 16px;text-align:center}
.stop-title{font-size:17px;font-weight:700;color:#bb5555;margin-bottom:6px}
.stop-sub{font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <div class="hdr-top">
    <span class="badge">STRIFE</span>
    <h1>Engine Roadmap</h1>
    <span class="stack">Zig master · Vulkan 1.3 · Flecs ECS · Cross-Platform</span>
  </div>
  <p class="goal">Complete Milestones 0–9 → stop engine work → build Strife gameplay only.</p>
  <div class="cells" id="cells"></div>
  <div class="overall">
    <div class="ob-wrap"><div class="ob-fill" id="ob-fill" style="width:0%"></div></div>
    <span class="ob-pct" id="ob-pct">0%</span>
    <span class="ob-counts" id="ob-counts"></span>
  </div>
</header>
<main id="root"></main>

<script>
const D = [
{n:0,name:"Foundation",icon:"⚙",tasks:[
{id:"m0t0",name:"Window",tag:"platform",
 desc:"Cross-platform window layer with OS-specific backends (Win32, X11/Wayland, Cocoa) selected at compile time. A shared platform.zig interface defines callbacks; each backend implements them. The renderer only sees the abstract interface.",
 notes:["Platform interface: src/platform/platform.zig — PlatformCallbacks + Window struct with fn pointers","Backends: src/platform/win32.zig (Windows), src/platform/x11.zig (Linux), src/platform/cocoa.zig (macOS)","Comptime backend selection via @import(\"builtin\").os.tag in platform.zig","Vulkan surface creation: vkCreateWin32SurfaceKHR / vkCreateXlibSurfaceKHR / vkCreateMetalSurfaceEXT per backend","SDL3 is a valid alternative backend if you want to defer platform work — one dep handles all three OS targets"],
 prompt:`[ENGINE] Strife | Zig master, Vulkan 1.3, Cross-Platform
[FILE] src/platform/platform.zig  (interface)
      src/platform/win32.zig      (Windows backend)
      src/platform/linux.zig      (X11 / Wayland backend)
      src/platform/macos.zig      (Cocoa / Metal surface backend)

Design a cross-platform window abstraction:

1. src/platform/platform.zig — shared interface:
   pub const Os = @import("builtin").os.tag;
   pub const WindowCallbacks = struct {
       on_resize: ?*const fn (u32, u32) void = null,
       on_close:  ?*const fn () void        = null,
   };
   pub const Window = switch (Os) {
       .windows => @import("win32.zig").Window,
       .linux   => @import("linux.zig").Window,
       .macos   => @import("macos.zig").Window,
       else     => @compileError("Unsupported platform"),
   };
   // Every backend must expose: init, deinit, poll_events, get_vulkan_instance_exts, create_vulkan_surface

2. src/platform/win32.zig — Windows backend:
   WNDCLASSEX + CS_OWNDC; WS_OVERLAPPEDWINDOW
   Messages: WM_SIZE→callbacks.on_resize; WM_DESTROY/WM_CLOSE→on_close
   RegisterRawInputDevices for RIDEV_NOLEGACY raw mouse
   get_vulkan_instance_exts: &.{"VK_KHR_surface","VK_KHR_win32_surface"}
   create_vulkan_surface(instance, out) → vkCreateWin32SurfaceKHR

3. src/platform/linux.zig — X11 backend (Wayland optional later):
   XOpenDisplay + XCreateWindow + XSelectInput
   Events: ConfigureNotify→on_resize; ClientMessage(WM_DELETE_WINDOW)→on_close
   get_vulkan_instance_exts: &.{"VK_KHR_surface","VK_KHR_xlib_surface"}
   create_vulkan_surface → vkCreateXlibSurfaceKHR

4. src/platform/macos.zig — Cocoa backend (via objc runtime or SDL3):
   NSApplication + NSWindow (Objective-C via @cImport or zig-objc)
   get_vulkan_instance_exts: &.{"VK_KHR_surface","VK_EXT_metal_surface"}
   create_vulkan_surface → vkCreateMetalSurfaceEXT via MoltenVK

[CONSTRAINT] Renderer and all engine code import only platform.zig — never a backend directly
[DELIVERABLE] Single build.zig compiles on all 3 OS targets; window opens and resizes cleanly; Vulkan surface created without error`},

{id:"m0t1",name:"Main Loop",tag:"platform",
 desc:"Fixed-timestep accumulator game loop (60 Hz logic tick, uncapped render). Passes interpolation alpha [0,1] to the render call for smooth motion between physics steps.",
 notes:["FIXED_DT = 1/60 s; accumulate frame delta, update N times per frame","Cap delta to 0.25 s to prevent spiral of death on slow frames","Interpolation alpha = accumulator / FIXED_DT passed to render()","platform.Window.poll_events() is non-blocking — call once per frame iteration"],
 prompt:`[ENGINE] Strife | Zig master, Cross-Platform
[FILE] src/engine/loop.zig

Implement fixed-timestep game loop:
1. FIXED_DT: f64 = 1.0 / 60.0
2. Frame timing: std.time.Timer (cross-platform in Zig stdlib)
   var timer = try std.time.Timer.start();
   delta = @as(f64, @floatFromInt(timer.lap())) / 1e9
3. Accumulator pattern:
     while (running) {
       const delta = @min(timer_lap_s(), 0.25);
       accum += delta;
       while (accum >= FIXED_DT) { engine_update(FIXED_DT); accum -= FIXED_DT; }
       engine_render(@floatCast(accum / FIXED_DT));
       platform.window.poll_events();  // non-blocking; fires callbacks
     }
4. EngineLoop struct: { running: bool, fixed_dt: f64 } with init(), run(), shutdown()
5. FPS counter: accumulate frames over 1 s; log via log_info

[DELIVERABLE] Stable 60 ticks/s update; FPS logged to console; clean shutdown when on_close fires`},

{id:"m0t2",name:"Input",tag:"platform",
 desc:"Cross-platform input system with a platform-agnostic event queue. Each platform backend translates OS events into InputEvent values. Edge detection (just_pressed/just_released) works identically on all targets.",
 notes:["InputEvent: union(enum) { key_down/up: Key, mouse_move: Vec2, mouse_button_down/up: u8, scroll: f32 }","Platform backends push events into the queue; InputSystem drains it each frame","begin_frame(): copy current state to previous; drain event queue","Raw mouse delta: Win32=RAWINPUT, Linux=XInput2 relative motion, macOS=NSEvent deltaX/Y"],
 prompt:`[ENGINE] Strife | Zig master, Cross-Platform
[FILE] src/platform/input.zig  (cross-platform layer)
      src/platform/win32.zig   (push raw WM_INPUT events)
      src/platform/linux.zig   (push XInput2 relative motion)
      src/platform/macos.zig   (push NSEvent deltaX/Y)

Implement cross-platform input:
1. Key enum: WASD, arrows, space, escape, shift, ctrl, alt, F1–F12, mouse L/R/M
   (values are abstract — backends map OS key codes to this enum)
2. InputEvent: union(enum) {
       key_down: Key, key_up: Key,
       mouse_move: struct { dx: f32, dy: f32 },   // raw delta, no acceleration
       mouse_button_down: u8, mouse_button_up: u8,
       scroll: f32,
   }
3. InputQueue: { events: [256]InputEvent, count: u32, mu: std.Thread.Mutex }
   fn push(q, evt: InputEvent) — called from platform backend during poll_events
4. InputState: { keys_cur: [256]bool, keys_prev: [256]bool, mouse_delta: Vec2, scroll: f32 }
5. fn input_begin_frame(state, queue):
   state.keys_prev = state.keys_cur; state.mouse_delta = .{0,0}; state.scroll = 0;
   Drain queue: for each event update keys_cur/mouse_delta/scroll; queue.count = 0
6. fn is_down(s, k)bool, fn is_just_pressed(s, k)bool, fn is_just_released(s, k)bool
7. Backend key mapping example (win32.zig):
   VK_W→Key.w, VK_A→Key.a, VK_SPACE→Key.space (comptime table)

[DELIVERABLE] WASD just_pressed fires exactly one frame on all 3 OS targets; raw delta unaffected by cursor speed`},

{id:"m0t3",name:"Timer",tag:"platform",
 desc:"High-resolution timer using std.time.Timer from Zig's stdlib — cross-platform with nanosecond precision. No OS-specific calls needed.",
 notes:["std.time.Timer.start() initialises; .lap() returns nanoseconds since last lap — no per-platform code","Wraps to f64 seconds: @as(f64, @floatFromInt(timer.lap())) / 1e9","Monotonic on all targets — immune to NTP / wall-clock jumps","Use timer_tick() as the sole delta source for the main loop"],
 prompt:`[ENGINE] Strife | Zig master, Cross-Platform
[FILE] src/platform/timer.zig

Implement high-resolution timer using Zig stdlib only:
1. Timer struct: { inner: std.time.Timer }
2. fn timer_init() !Timer — .inner = try std.time.Timer.start()
3. fn timer_tick(t: *Timer) f64:
   ns: u64 = t.inner.lap()
   return @as(f64, @floatFromInt(ns)) / 1_000_000_000.0
4. fn timer_now_s(t: *Timer) f64 — .inner.read() converted to seconds (does not reset lap)
5. fn timer_elapsed_ms(t: *Timer) f64 — .inner.read() / 1_000_000.0
6. fn timer_sleep_ms(ms: u64) void — std.time.sleep(ms * std.time.ns_per_ms)

No platform-specific code. std.time.Timer uses:
  Windows  → QueryPerformanceCounter internally
  Linux    → clock_gettime(CLOCK_MONOTONIC)
  macOS    → mach_absolute_time()

[DELIVERABLE] timer_tick() returns ~0.0167 at 60 fps on all 3 OS targets; two consecutive calls without sleep return < 0.001 s`},

{id:"m0t4",name:"Logging",tag:"core",
 desc:"Structured logger with levels (Debug/Info/Warn/Error), source location via @src(), and ANSI color terminal output. Debug calls compile to nothing in ReleaseFast.",
 notes:["@src() gives file + line for free — no macro tricks needed","Levels: Debug=cyan, Info=white, Warn=yellow, Error=red (ANSI escapes)","Compile-time filtering: if level==.debug and mode!=Debug then return","log_debug/log_info/log_warn/log_err shorthand wrappers passing @src() automatically"],
 prompt:`[ENGINE] Strife | Zig master
[FILE] src/core/log.zig

Implement structured logging:
1. LogLevel enum: .debug, .info, .warn, .err
2. fn log(comptime level: LogLevel, comptime fmt: []const u8, args: anytype, src: std.builtin.SourceLocation) void
   Format: "[WARN] src/foo.zig:42 — message"
   ANSI colors per level (write to stderr)
3. Comptime strip: if (level == .debug) if (@import("builtin").mode != .Debug) return;
4. Shorthand macros (call with @src()):
   pub fn log_debug(comptime fmt: []const u8, args: anytype) void { log(.debug, fmt, args, @src()); }
   Same for log_info, log_warn, log_err
5. Optional file sink: append to "strife.log" alongside stderr

[CONSTRAINT] Zero runtime cost for debug logs in ReleaseFast — verified by checking generated assembly
[DELIVERABLE] Colored output with file:line; log_debug call absent from ReleaseFast binary`},

{id:"m0t5",name:"Assertions",tag:"core",
 desc:"Debug assertions using @src() for zero-boilerplate file/line context. Triggers @breakpoint() in Debug, compiles to nothing in ReleaseFast.",
 notes:["strife_assert(cond, msg, @src()) is the primary form","strife_panic always fires even in release (unrecoverable error)","@breakpoint() lets a debugger catch it before unwinding the stack","All compile out in ReleaseFast — no runtime overhead"],
 prompt:`[ENGINE] Strife | Zig master
[FILE] src/core/assert.zig

Implement assertions:
1. pub fn strife_assert(cond: bool, comptime msg: []const u8, src: std.builtin.SourceLocation) void
   In Debug: if (!cond) { log_err("ASSERT: {s} @ {s}:{d}", .{msg,src.file,src.line}); @breakpoint(); }
   In Release: empty body (comptime if on std.builtin.mode)
2. pub fn strife_assertf(cond: bool, comptime fmt: []const u8, args: anytype, src: std.builtin.SourceLocation) void
3. pub fn strife_panic(comptime msg: []const u8) noreturn — always active, prints + @panic
4. pub fn strife_unreachable(src: std.builtin.SourceLocation) noreturn — for exhaustive switch arms

Usage: strife_assert(ptr != null, "ptr must not be null", @src());

[DELIVERABLE] @breakpoint fires in Debug on failed assert; zero instructions in ReleaseFast binary`},

{id:"m0t6",name:"Filesystem",tag:"core",
 desc:"File I/O utilities built on std.fs: read-entire-file, write, exists check, and path manipulation. Foundation for the asset pipeline and config loading.",
 notes:["read_file_alloc returns caller-owned []u8 — caller frees","path_ext / path_stem needed by the asset manager","make_dirs for output directories","Handle std.fs errors ergonomically — no raw zig error leaks to callers"],
 prompt:`[ENGINE] Strife | Zig master
[FILE] src/core/fs.zig

Implement filesystem utilities:
1. read_file_alloc(alloc: Allocator, path: []const u8) ![]u8 — cwd().openFile + readToEndAlloc; caller frees
2. write_file(path: []const u8, data: []const u8) !void — createFile + writeAll
3. file_exists(path: []const u8) bool — cwd().access, catch return false
4. make_dirs(path: []const u8) !void — std.fs.cwd().makePath
5. path_ext(path: []const u8) []const u8 — last '.' to end; "" if none
6. path_stem(path: []const u8) []const u8 — after last '/' up to last '.'
7. path_join(alloc: Allocator, parts: []const []const u8) ![]u8 — join with '/' separator

[DELIVERABLE] read_file_alloc("assets/test.txt") returns correct content; make_dirs creates nested dirs`},

{id:"m0t7",name:"Math",tag:"core",
 desc:"Vec2/3/4, Mat4 (column-major for Vulkan/GLSL), Quaternion. perspective_vk flips Y and maps depth to [0,1] for correct Vulkan NDC.",
 notes:["Column-major: m[col][row] — matches GLSL layout(column_major)","perspective_vk MUST negate Y (Vulkan Y-down) and set depth range [0,1] not [-1,1]","Quat: from_euler, to_mat4, slerp, mul, normalize","AABB3 struct for future culling: { min, max: Vec3 }"],
 prompt:`[ENGINE] Strife | Zig master, Vulkan 1.3 / GLSL
[FILE] src/math/math.zig (or split vec/mat/quat)

Implement math library:
1. Vec2/Vec3/Vec4: packed struct { x,y,z,w: f32 }
   Methods: add, sub, scale, dot, length, normalize, lerp; Vec3: cross
2. Mat4: [4][4]f32 (column-major: m[col][row])
   identity(), mul(a,b), transpose()
   translate(v: Vec3), scale(v: Vec3), rotate(angle_rad: f32, axis: Vec3)
   look_at(eye, center, up: Vec3) -> Mat4
   perspective_vk(fov_y_rad, aspect, near, far: f32) -> Mat4
     — negate Y: result[1][1] *= -1 (Vulkan Y-down NDC)
     — depth [0,1]: different projection formula than GL
3. Quat: { x,y,z,w: f32 }
   from_euler(Vec3) Quat, to_mat4(Quat) Mat4, mul, slerp, normalize
4. AABB3: { min, max: Vec3 } — contains_point, intersects_aabb

[CONSTRAINT] perspective_vk must produce correct results — test: cube at z=-5 visible with 45° FOV
[DELIVERABLE] Unit test: identity * vec == vec; perspective_vk NDC depth in [0,1]; look_at correct`},

{id:"m0t8",name:"Memory",tag:"core",
 desc:"Arena allocator for per-frame scratch, pool allocator for fixed-size objects. The existing DebugAllocator must be heap-allocated to prevent self-pointer invalidation when parent structs move.",
 notes:["Arena: reset() each frame start — no individual frees needed for temp allocs","Pool: free-list embedded in unused slots, O(1) alloc/free","DebugAllocator must live behind a pointer — was previously a stack copy which caused dangling self-pointer","Expose Allocators.frame_arena as the preferred scratch allocator"],
 prompt:`[ENGINE] Strife | Zig master
[FILE] src/core/memory.zig

Implement custom allocators:
1. ArenaAllocator: { buf: []u8, offset: usize, backing: Allocator }
   init(backing, capacity): allocate buf; alloc(size, align) -> []u8 by bumping offset
   reset(): offset = 0 (called at frame start)
   toAllocator(): return std.mem.Allocator interface
2. PoolAllocator(comptime T: type, comptime N: usize):
   slots: [N]T; free_stack: [N]u16; top: u16
   get() *T: pop from free_stack; release(*T): push index back
3. Ensure DebugAllocator (GPA) is stored as *GPA not GPA — add to heap in engine init:
   const gpa = try std.heap.page_allocator.create(std.heap.GeneralPurposeAllocator(.{}));
   gpa.* = .{};
4. Allocators struct: { frame: ArenaAllocator, general: *std.heap.GeneralPurposeAllocator(.{}) }

[CONSTRAINT] Moving ArenaAllocator after init is safe (no self-pointers); GPA must NOT be moved
[DELIVERABLE] arena.reset() resets correctly; pool get/release O(1); GPA leak check clean at shutdown`},

{id:"m0t9",name:"Job System",tag:"core",
 desc:"Thread pool with a shared job queue (Mutex + Condition). Enables parallel ECS system execution and async asset loading.",
 notes:["Spawn N = cpu_count-1 worker threads at init","Job: { func: *const fn(*anyopaque)void, ctx: *anyopaque }","wait_all() spins until queue empty AND all workers idle (atomic counter)","Shutdown: set running=false, broadcast, join all threads"],
 prompt:`[ENGINE] Strife | Zig master
[FILE] src/core/jobs.zig

Implement thread pool:
1. Job: { func: *const fn(*anyopaque) void, ctx: *anyopaque }
2. JobQueue: { list: std.ArrayList(Job), mu: std.Thread.Mutex, cv: std.Thread.Condition }
3. ThreadPool: { threads: []std.Thread, queue: JobQueue, active: std.atomic.Value(u32), running: std.atomic.Value(bool) }
4. init(alloc, n: usize): spawn n workers
   Worker: while running: mu.lock; while list.empty and running: cv.wait; pop job; mu.unlock; active.inc; job.func(job.ctx); active.dec; cv.broadcast
5. submit(func, ctx): queue.mu.lock; push; cv.signal; mu.unlock
6. wait_all(): while queue.list.len > 0 or active.load() > 0: std.Thread.yield()
7. deinit(): running=false; cv.broadcast; join all

[DELIVERABLE] submit 1000 jobs across 4 workers; wait_all() correctly synchronizes; no data races (tested with --sanitize-thread)`},

{id:"m0t11",name:"UUID",tag:"core",
 desc:"UUID v4 generator for stable asset IDs, entity identities, and save-data references. 128-bit random with standard 8-4-4-4-12 hex string format.",
 notes:["std.crypto.random for entropy — cryptographically random","Set version nibble (0x40) and variant bits (0x80) per RFC 4122","Round-trip: uuid_new() → uuid_to_str → uuid_parse == original","Used by AssetManager, scene serializer, and save system"],
 prompt:`[ENGINE] Strife | Zig master
[FILE] src/core/uuid.zig

Implement UUID v4:
1. UUID struct: { bytes: [16]u8 }
2. uuid_new() UUID:
   std.crypto.random.bytes(&bytes)
   bytes[6] = (bytes[6] & 0x0F) | 0x40  // version 4
   bytes[8] = (bytes[8] & 0x3F) | 0x80  // variant RFC 4122
3. uuid_to_buf(uuid, buf: *[36]u8) void — write xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx (no alloc)
4. uuid_to_str(uuid, alloc) ![]u8 — allocated version for JSON serialization
5. uuid_parse(s: []const u8) !UUID — parse 36-char string; error if wrong format
6. uuid_nil() UUID — all zeros (invalid sentinel)
7. uuid_eql(a, b: UUID) bool — std.mem.eql

[DELIVERABLE] uuid_new() round-trips parse(to_str(id)) == id; nil UUID detectable; 1M calls produce no duplicates`}
]},

{id:"m1t1",name:"Component Storage",tag:"ecs",

Define component registration helpers:
1. fn register_component(world: *c.ecs_world_t, comptime T: type, name: [:0]const u8) c.ecs_entity_t:
   var desc = std.mem.zeroes(c.ecs_component_desc_t);
   desc.entity = c.ecs_entity_init(world, &.{.name = name});

{id:"m2t2",name:"Texture Import",tag:"assets",
 desc:"Load PNG/JPG via stb_image and upload as mipmapped VkImage (RGBA8). Mip chain generated via vkCmdBlitImage. Full GpuTexture includes view and sampler.",
 notes:["stb_image.h C binding: stbi_load → *u8; stbi_image_free","VK_FORMAT_R8G8B8A8_UNORM with mip levels = floor(log2(max(w,h)))+1","Blit-based mip generation requires VK_IMAGE_USAGE_TRANSFER_SRC_BIT on the image","VkSampler created alongside: LINEAR filter, VK_SAMPLER_MIPMAP_MODE_LINEAR"],
 prompt:`[ENGINE] Strife | Zig master, Vulkan 1.3, VMA, stb_image
[FILE] src/assets/texture_import.zig + src/renderer/gpu_texture.zig

Implement texture loading:
1. stbi_load binding via @cImport("stb_image.h") — define STB_IMAGE_IMPLEMENTATION in a .c file
2. TextureData: { pixels: [*]u8, w: u32, h: u32, channels: u32 } + fn free()
3. upload_texture(device, vma, queue, cmd_pool, data) !GpuTexture:
   a. mip_levels = @as(u32, @intFromFloat(@floor(@log2(@as(f32,@floatFromInt(@max(w,h))))))) + 1
   b. Create VkImage: RGBA8_UNORM, TILING_OPTIMAL, TRANSFER_SRC|DST|SAMPLED, mip_levels
   c. Staging buffer: VMA CPU_ONLY, memcpy pixels
   d. Barrier UNDEFINED→TRANSFER_DST (all mips); vkCmdCopyBufferToImage mip 0
   e. Generate mips: loop vkCmdBlitImage(mip i→i+1) with barrier between each
   f. Final barrier: TRANSFER_SRC→SHADER_READ_ONLY
   g. Create VkImageView (all mips, COLOR_BIT)
   h. Create VkSampler (LINEAR min/mag, MIPMAP_MODE_LINEAR, REPEAT, maxLod=mip_levels)
4. GpuTexture: { image, view, sampler: Vk*, alloc: VmaAllocation, w,h,mips: u32 }

[DELIVERABLE] rock.png loads; mips visible at distance; validation layers silent`},

{id:"m2t6",name:"Hot Reload",tag:"assets",
 desc:"Cross-platform asset hot-reload via periodic mtime polling (std.fs.File.stat). No OS-specific watcher API — poll every 100ms on a background thread, push changed paths to a queue.",
 notes:["std.fs.File.stat().mtime is cross-platform; no inotify/ReadDirectoryChanges/FSEvents needed","Background thread polls; main thread drains changes queue each frame via Mutex","Shader change: rerun glslc → rebuild VkShaderModule → rebuild affected pipelines","Debounce: skip if same path reloaded within last 300ms (mtime can jitter on some FS)"],
 prompt:`[ENGINE] Strife | Zig master, Cross-Platform
[FILE] src/assets/hot_reload.zig

Implement cross-platform hot reload via mtime polling:
1. WatchedFile: { path: []const u8, last_mtime: i128 }
2. HotReloader: { watched: ArrayList(WatchedFile), queue: ArrayList([]const u8), mu: std.Thread.Mutex, thread: std.Thread, running: std.atomic.Value(bool) }
3. fn hot_reload_watch(hr, path) — add to watched list with current mtime
4. Background thread (runs every 100ms):
   For each WatchedFile:
     stat = std.fs.cwd().statFile(path) catch continue
     if stat.mtime != file.last_mtime:
       file.last_mtime = stat.mtime
       mu.lock(); queue.append(path); mu.unlock()
   std.time.sleep(100 * std.time.ns_per_ms)
5. fn hot_reload_poll(hr, asset_mgr, renderer) void (call per frame):
   mu.lock(); defer mu.unlock()
   For each changed path in queue:
     if std.mem.endsWith(u8, path, ".vert") or ".frag" or ".comp":
       recompile glslc → reload ShaderModule → mark pipeline dirty
     if ".png" or ".jpg" or ".ktx2":
       reload stb_image → re-upload to existing GpuTexture slot
     if ".glb" or ".obj":
       reload cgltf/obj parser → re-upload to existing GpuMesh slot
   queue.clearRetainingCapacity()
6. Debounce: per-path HashMap(path, last_reload_ns); skip if < 300ms since last reload

[CONSTRAINT] Zero OS-specific APIs — works identically on Windows, Linux, macOS
[DELIVERABLE] Edit rock.png → texture updates in running engine within ~200ms; no crash on rapid saves`}
]},

// ── State ────────────────────────────────────────────────────────
const expandedTasks = new Set();
const openMs = new Set([0,1]);

function getKey(id){ return 'strife_'+id; }

// Seed state reflecting actual repo progress as of 2026-06-26 (see CLAUDE.md
// roadmap section for the per-item notes on what's done vs partial vs not
// started). Only used when localStorage has no explicit value yet for an id,
// so it never clobbers anything you've manually toggled in this browser.
const DEFAULT_DONE = new Set([
  'm0t0','m0t1','m0t2','m0t3','m0t4','m0t5','m0t6','m0t7','m0t8','m0t9','m0t10','m0t11',
  'm1t0','m1t1','m1t2','m1t3','m1t4','m1t5','m1t6','m1t7',
  'm2t0','m2t1','m2t2','m2t3','m2t4','m2t5','m2t6',
  'm3t0','m3t1','m3t2','m3t3','m3t4','m3t5','m3t6','m3t7','m3t8',
  'm4t0','m4t1','m4t2','m4t3','m4t4',
  'm5t0','m5t1','m5t2','m5t3','m5t4',
  'm6t0','m6t1','m6t2','m6t3',
  'm7t0','m7t1','m7t2',
  'm8t0','m8t1','m8t2','m8t3',
  'm9t0','m9t1','m9t2','m9t3','m9t4','m9t5','m9t6','m9t7'
]);
const DEFAULT_PARTIAL = new Set([
]);

function isDone(id){
  const v=localStorage.getItem(getKey(id));
  if(v===null) return DEFAULT_DONE.has(id);
  return v==='1';
}
function setDone(id,v){ localStorage.setItem(getKey(id),v?'1':'0'); }
function isPartial(id){
  if(isDone(id)) return false;
  if(localStorage.getItem(getKey(id))!==null) return false; // user has explicitly set this; don't second-guess it
  return DEFAULT_PARTIAL.has(id);
}

function mPct(m){
  if(!m.tasks.length) return {done:0,total:0,pct:0};
  const done=m.tasks.filter(t=>isDone(t.id)).length;
  const weighted=done+m.tasks.filter(t=>isPartial(t.id)).length*0.5;
  return {done,total:m.tasks.length,pct:Math.round(weighted/m.tasks.length*100)||0};
}
function totalPct(){
  let tot=0,done=0,weighted=0;
  D.forEach(m=>m.tasks.forEach(t=>{tot++;if(isDone(t.id)){done++;weighted++;}else if(isPartial(t.id)){weighted+=0.5;}}));
  return {done,total:tot,pct:Math.round(weighted/tot*100)||0};
}

// ── Build DOM ────────────────────────────────────────────────────
function buildCells(){
  const el=document.getElementById('cells');
  el.innerHTML=D.filter(m=>!m.stop).map((m,i)=>{
    const {pct}=mPct(m);
    return `<div class="cell">
      <div class="cell-bar"><div class="cell-fill${pct===100?' complete':''}" id="cf${i}" style="width:${pct}%"></div></div>
      <span class="cell-label${pct===100?' complete':''}" id="cl${i}">M${i}&nbsp;${m.name.substring(0,7)}</span>
    </div>`;
  }).join('');
}

function tagClass(tag){ return 'tg-'+tag; }

function buildTasks(m){
  return m.tasks.map(t=>{
    const done=isDone(t.id);
    const partial=isPartial(t.id);
    const open=expandedTasks.has(t.id);
    return `<div class="task" id="task_${t.id}">
      <div class="task-main">
        <input type="checkbox" class="task-cb${partial?' partial':''}" id="cb_${t.id}" ${done?'checked':''} title="${partial?'Partially implemented — see CLAUDE.md for details':''}">
        <label class="task-name${partial?' partial':''}" for="cb_${t.id}">${t.name}</label>
        <span class="tag ${tagClass(t.tag)}">${t.tag}</span>
        <button class="exp-btn${open?' open':''}" id="eb_${t.id}" onclick="toggleTask('${t.id}')">${open?'▾ DETAILS':'▸ DETAILS'}</button>
      </div>
      <div class="task-detail${open?' show':''}" id="td_${t.id}">
        <p class="det-desc">${t.desc}</p>
        <ul class="det-notes">${t.notes.map(n=>`<li>${n}</li>`).join('')}</ul>
        <div class="prompt-hdr">
          <span class="prompt-lbl">⬡ Devin Prompt</span>
          <button class="copy-btn" id="cpbtn_${t.id}" onclick="copyPrompt('${t.id}')">COPY</button>
        </div>
        <pre class="prompt-box" id="pb_${t.id}">${t.prompt}</pre>
      </div>
    </div>`;
  }).join('');
}

function buildContent(){
  const root=document.getElementById('root');
  root.innerHTML=D.map((m,mi)=>{
    const {done,total,pct}=mPct(m);
    const open=openMs.has(mi);
    if(m.stop) return `
      <div class="ms stop" id="ms_${mi}">
        <div class="ms-hdr" onclick="toggleMs(${mi})">
          <span class="ms-icon">${m.icon}</span>
          <span class="ms-num">M${mi}</span>
          <span class="ms-name">${m.name}</span>
          <span class="chv${open?' open':''}" id="chv_${mi}">▶</span>
        </div>
        <div id="msb_${mi}" style="display:${open?'block':'none'}">
          <div class="stop-body">
            <div class="stop-title">🎮 Start Building Strife Gameplay</div>
            <div class="stop-sub">Engine work is complete. No more renderer features, no more system architecture. Ship Strife.</div>
          </div>
        </div>
      </div>`;
    return `
      <div class="ms" id="ms_${mi}">
        <div class="ms-hdr" onclick="toggleMs(${mi})">
          <span class="ms-icon">${m.icon}</span>
          <span class="ms-num">M${mi}</span>
          <span class="ms-name">${m.name}</span>
          <span class="ms-ptext" id="mpt_${mi}">${done}/${total}</span>
          <div class="ms-mbar"><div class="ms-mfill" id="mmf_${mi}" style="width:${pct}%"></div></div>
          <span class="chv${open?' open':''}" id="chv_${mi}">▶</span>
        </div>
        <div class="ms-body" id="msb_${mi}" style="display:${open?'block':'none'}">
          ${buildTasks(m)}
        </div>
      </div>`;
  }).join('');

  // Attach checkbox listeners
  D.forEach(m=>m.tasks.forEach(t=>{
    const cb=document.getElementById('cb_'+t.id);
    if(cb) cb.addEventListener('change',()=>{
      setDone(t.id,cb.checked);
      // Once explicitly toggled, this id is no longer "partial" — drop the
      // amber styling immediately rather than waiting for a full re-render.
      cb.classList.remove('partial');
      cb.title='';
      const lbl=document.querySelector('label[for="cb_'+t.id+'"]');
      if(lbl) lbl.classList.remove('partial');
      updateProgress();
    });
  }));
}

// ── Update progress (no re-render) ──────────────────────────────
function updateProgress(){
  const {done,total,pct}=totalPct();
  document.getElementById('ob-fill').style.width=pct+'%';
  document.getElementById('ob-pct').textContent=pct+'%';
  document.getElementById('ob-counts').textContent=done+' / '+total;
  D.forEach((m,mi)=>{
    if(m.stop) return;
    const {done:md,total:mt,pct:mp}=mPct(m);
    const mmf=document.getElementById('mmf_'+mi);
    const mpt=document.getElementById('mpt_'+mi);
    const cf=document.getElementById('cf'+mi);
    const cl=document.getElementById('cl'+mi);
    if(mmf) mmf.style.width=mp+'%';
    if(mpt) mpt.textContent=md+'/'+mt;
    if(cf){ cf.style.width=mp+'%'; cf.className='cell-fill'+(mp===100?' complete':''); }
    if(cl){ cl.className='cell-label'+(mp===100?' complete':''); }
  });
}

// ── Interactions ─────────────────────────────────────────────────
function toggleMs(mi){
  const body=document.getElementById('msb_'+mi);
  const chv=document.getElementById('chv_'+mi);
  if(!body) return;
  const open=body.style.display==='block';
  body.style.display=open?'none':'block';
  if(chv) chv.className='chv'+(open?'':' open');
  if(open) openMs.delete(mi); else openMs.add(mi);
}

function toggleTask(taskId){
  const det=document.getElementById('td_'+taskId);
  const btn=document.getElementById('eb_'+taskId);
  if(!det) return;
  const open=det.classList.toggle('show');
  if(btn){ btn.classList.toggle('open',open); btn.textContent=open?'▾ DETAILS':'▸ DETAILS'; }
  if(open) expandedTasks.add(taskId); else expandedTasks.delete(taskId);
}

function copyPrompt(taskId){
  const pb=document.getElementById('pb_'+taskId);
  const btn=document.getElementById('cpbtn_'+taskId);
  if(!pb||!btn) return;
  navigator.clipboard.writeText(pb.textContent).then(()=>{
    btn.textContent='✓ COPIED'; btn.classList.add('ok');
    setTimeout(()=>{ btn.textContent='COPY'; btn.classList.remove('ok'); },2000);
  }).catch(()=>{
    // fallback
    const sel=window.getSelection(), range=document.createRange();
    range.selectNodeContents(pb); sel.removeAllRanges(); sel.addRange(range);
    document.execCommand('copy');
    sel.removeAllRanges();
    btn.textContent='✓ COPIED'; btn.classList.add('ok');
    setTimeout(()=>{ btn.textContent='COPY'; btn.classList.remove('ok'); },2000);
  });
}

// ── Init ──────────────────────────────────────────────────────────
buildCells();
buildContent();
updateProgress();
</script>
</body>
